name: Release

# Build the Windows app and publish it to a GitHub Release.
# Trigger by pushing a version tag (e.g. `git tag v0.2.0 && git push origin v0.2.0`),
# or run manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Keep the built artifact/version in sync with the pushed tag (vX.Y.Z).
      - name: Sync version to tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting package.json version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # electron-builder reads GH_TOKEN to upload the installer (.exe), portable
      # zip, and latest.yml auto-update metadata to a draft GitHub Release.
      - name: Build and publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
